name: Update Version and Deploy

on:
  push:
    branches:
      - main

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get current Git tag
        id: get_tag
        run: echo "tag=$(git describe --tags --always)" >> $GITHUB_ENV

      - name: Update version in index.html and version.json
        run: |
          VERSION=$tag
          sed -i "s/<title>.*<\/title>/<title>Auton Arvon Alenema ja Polttoainekustannukset v$VERSION<\/title>/" /github/workspace/index.html
          sed -i "s/<meta name=\"description\" content=\".*\">/<meta name=\"description\" content=\"Auton arvon alenema ja polttoainekustannukset v$VERSION\">/" /github/workspace/index.html
          echo "{\"version\": \"$VERSION\"}" > /github/workspace/version.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html version.json
          git commit -m "Update version to $tag"
          git push

      - name: Deploy to server
        run: |
          echo "Deploying the updated version..."
