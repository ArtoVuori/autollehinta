name: Update Version and Deploy

on:
  push:
    branches:
      - main

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get current Git tag
        id: get_tag
        run: echo "tag=$(git describe --tags --always)" >> $GITHUB_ENV

      - name: Update version in index.html, javascript.js, and style.css
        run: |
          VERSION=$tag
          echo "Updating files with version $VERSION"
          sed -i "s/<title>.*<\\/title>/<title>Auton Arvon Alenema ja Polttoainekustannukset v$VERSION<\\/title>/g" index.html
          sed -i "s/<meta name=\\\"description\\\" content=\\\".*\\\">/<meta name=\\\"description\\\" content=\\\"Auton arvon alenema ja polttoainekustannukset v$VERSION\\\">/g" index.html
          sed -i "s/version: '.*'/version: '$VERSION'/g" javascript.js
          echo "{\"version\": \"$VERSION\"}" > version.json

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html javascript.js style.css version.json
          git commit -m "Update version to $tag" || echo "No changes to commit"
          git push

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "Deploying the updated version to Plesk server..."

          # Configure SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H your-server-ip >> ~/.ssh/known_hosts

          # Transfer all files to Plesk server
          rsync -avz --delete ./ username@your-server-ip:/path/to/plesk/directory

          # Restart the web server if needed (optional)
          ssh username@your-server-ip "sudo service apache2 restart || sudo service nginx restart"
